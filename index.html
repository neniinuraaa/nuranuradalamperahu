<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat Buat Kamu 💌</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #ffd6e7, #ffeef6); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .card { width: 90%; max-width: 400px; min-height: 400px; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border-radius: 30px; padding: 40px; text-align: center; box-shadow: 0 10px 30px rgba(255,105,180,0.2); position: relative; transition: all 0.5s; }
        h1 { color: #ff4f87; font-size: 22px; margin-bottom: 20px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 50px; background: #ff6fa4; color: white; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 8px; }
        button:hover { transform: scale(1.05); background: #ff4f87; }
        .kabur { position: relative; }
        .shake { animation: shake 0.5s infinite; display: inline-block; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 50% {transform: translateX(-10px);} }
        .heart { position: fixed; top: -50px; font-size: 20px; animation: fall linear infinite; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh); } }
    </style>
</head>
<body>

<div class="card" id="card">
    <div id="content">
        <h1>Haii, ada surat nih! 💌</h1>
        <button onclick="updatePage(0)">Buka</button>
        <button class="kabur" onmouseover="gerak(this)">Gak mau</button>
    </div>
</div>

<script>
    const content = document.getElementById('content');
    const card = document.getElementById('card');

    function gerak(btn) {
        const cardRect = card.getBoundingClientRect();
        const maxX = cardRect.width - btn.offsetWidth - 40;
        const maxY = cardRect.height - btn.offsetHeight - 40;
        btn.style.position = "absolute";
        btn.style.left = (Math.random() * maxX) + "px";
        btn.style.top = (Math.random() * maxY) + "px";
    }

    function updatePage(n) {
        let html = "";
        switch(n) {
            case 0: html = "<h1>Verifikasi</h1><p>Kamu Lukman kan? 🤭</p><button onclick='updatePage(1)'>HEEH UING</button><button class='kabur' onmouseover='gerak(this)'>bukannn</button>"; break;
            case 'bukan': html = "<p>Yahhh... berarti ini bukan buat kamu. 🌸</p><button onclick='location.reload()'>Keluar</button>"; break;
            case 1: html = "<h1>📩 Oke...</h1><p>Berarti ini emang buat kamu. Janji ya, baca sampai selesai? Pusing tau bikinnya! 😭😭</p><button onclick='updatePage(2)'>Janji! 🤝</button><button class='kabur' onmouseover='gerak(this)'>Males ah</button>"; break;
            case 2: html = "<h1>😃🤟</h1><p>Makasiii ya udah selalu dengerin aku cerita.</p><button onclick='updatePage(3)'>sama-samaaa😃🤟</button><button class='kabur' onmouseover='gerak(this)'>ga mau denger sbnrnya</button>"; break;
            case 3: html = "<p>Aku lebih seneng duduk di rumah ngobrol sama kamu.</p><button onclick='updatePage(4)'>Terus?</button><button class='kabur' onmouseover='gerak(this)'>b azaaa</button>"; break;
            case 4: card.style.background = "rgba(0,0,0,0.7)"; card.style.color = "white"; html = "<h1>TAPI...</h1><button onclick='updatePage(5)'>Apa? 😨</button><button class='kabur' onmouseover='gerak(this)'>gapeduli🤪</button>"; break;
            case 5: card.style.background = "rgba(255,255,255,0.7)"; card.style.color = "#555"; html = "<h1>GUE. KESEL. SAMA. LO. 😾</h1><button onclick='updatePage(6)'>aku kan baik😁</button><button onclick='updatePage(6)'>bodoamat😊😊</button>"; break;
            case 6: html = "<h1 class='shake'>KARENA KAMU MIRIP FIRAUN MESIR 👑</h1><p>😂😂😂</p><button onclick='updatePage(7)'>EMANGGGG🤪</button><button class='kabur' onmouseover='gerak(this)'>IDIHHHHH</button>"; break;
            case 7: html = "<h1>Eh bentar...</h1><p>tapi btw keren ya btw codingannya? 🤭</p><button onclick='updatePage(8)'>mayan lahhh</button><button class='kabur' onmouseover='gerak(this)'>jelekkk😜</button>"; break;
            case 8: html = "<p>aku pamer doang lagi belajar coding. dulu diajar di lab sm pabambang banget sm pasufyan😭</p><button onclick='updatePage(9)'>y</button><button class='kabur' onmouseover='gerak(this)'>apakah aku terlihat peduli?</button>"; break;
            case 9: html = "<p>kalo 2 atau 3 tahun lagi aku nikah...</p><button onclick='updatePage(10)'>apehhh?</button><button class='kabur' onmouseover='gerak(this)'>gak tertarik</button>"; break;
            case 10: html = "<p>dateng yee plis. amplopnya 500.000 aja.</p><button onclick='updatePage(11)'>deal 🤝</button><button class='kabur' onmouseover='gerak(this)'>gadulu mahal!😭</button>"; break;
            case 11: html = "<p>Kalau keberatan... 1 juta juga gapapa sih. 😇😇</p><button onclick='updatePage(12)'>yaelah</button><button class='kabur' onmouseover='gerak(this)'>gaduluuu</button>"; break;
            case 12: html = "<h1>eits, tunggu!</h1><p>kamu sbnrnya tau nama aku gasih? 😭</p><button onclick='updatePage(\"salah\")'>Neni Nura</button><button onclick='updatePage(\"benar\")'>Neni Nurhaiti</button><button class='kabur' onmouseover='gerak(this)'>gtau bodoamat</button>"; break;
            case 'salah': html = "<h1>PAYAH BANGET!</h1><p>Kita unfriend! 😡 Coba lagi.</p><button onclick='updatePage(12)'>Coba lagi</button><button class='kabur' onmouseover='gerak(this)'>Minta maaf</button>"; break;
            case 'benar': html = "<h1>nahhh baru tmen gue😃🤟</h1><p>udah ah pusing. sekarang tos dulu sini!! 👊</p><button onclick='finish()'>🫴nyalim Tos!</button><button onclick='finish()'>👊 tosss!!!</button>"; break;
        }
        content.innerHTML = html;
    }

    function finish() {
        content.innerHTML = "<h1>makasiii udah mau baca sampai habis! 🤣</h1><p>Sekarang, kita tos dulu! 👊</p><button onclick='window.close()'>Keluar</button>";
        confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
        for(let i=0; i<30; i++){
            let h = document.createElement("div");
            h.className = "heart";
            h.innerHTML = "💖";
            h.style.left = Math.random() * 100 + "vw";
            h.style.animationDuration = (3 + Math.random() * 3) + "s";
            document.body.appendChild(h);
        }
    }
</script>
</body>
</html>
